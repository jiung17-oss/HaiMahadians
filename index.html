<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Nike Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" id="cardContainer">
        <div class="content">
            <h1>Nike Air Max</h1>
            <p>Ikon gaya dengan kenyamanan maksimal sepanjang hari.</p>
            <button class="buy-btn">Buy Now</button>
        </div>
        
        <img src="https://images.clothes.com/sneakers/orange-shoe.png" id="shoeImage" alt="Nike Shoe">

        <div class="colors">
            <span class="color-dot orange" onclick="changeColor('#ff6b00', 'https://images.clothes.com/sneakers/orange-shoe.png')"></span>
            <span class="color-dot green" onclick="changeColor('#9acd32', 'https://images.clothes.com/sneakers/green-shoe.png')"></span>
            <span class="color-dot purple" onclick="changeColor('#8a2be2', 'https://images.clothes.com/sneakers/purple-shoe.png')"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
